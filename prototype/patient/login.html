<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 在线问诊平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/patient.css">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(180deg, #E6F7FF 0%, #FFFFFF 50%);
            display: flex;
            flex-direction: column;
        }

        .login-header {
            padding: 60px 24px 40px;
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(24, 144, 255, 0.3);
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .login-form {
            flex: 1;
            padding: 0 24px;
        }

        .login-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }

        .login-tab {
            font-size: 16px;
            color: var(--text-secondary);
            padding-bottom: 8px;
            border-bottom: 2px solid transparent;
        }

        .login-tab.active {
            color: var(--primary-color);
            font-weight: 500;
            border-bottom-color: var(--primary-color);
        }

        .login-form .input-group {
            margin-bottom: 16px;
        }

        .login-form .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .login-form .input-wrapper .input {
            flex: 1;
        }

        .login-code-btn {
            width: 110px;
            height: 44px;
            background: var(--primary-bg);
            color: var(--primary-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            flex-shrink: 0;
            border: 1px solid var(--primary-color);
        }

        .login-code-btn:disabled {
            background: var(--bg-secondary);
            color: var(--text-disabled);
            border-color: var(--border-color);
        }

        .login-forget {
            text-align: right;
            margin-top: 12px;
        }

        .login-forget a {
            color: var(--primary-color);
            font-size: 13px;
        }

        .login-agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 24px 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .login-agreement input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            accent-color: var(--primary-color);
        }

        .login-agreement a {
            color: var(--primary-color);
        }

        .login-third-party {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-secondary);
        }

        .login-third-party-title {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 20px;
            position: relative;
        }

        .login-third-party-title::before,
        .login-third-party-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background: var(--border-color);
        }

        .login-third-party-title::before {
            left: 25%;
        }

        .login-third-party-title::after {
            right: 25%;
        }

        .login-third-party-btns {
            display: flex;
            justify-content: center;
            gap: 48px;
        }

        .login-third-party-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: none;
            cursor: pointer;
        }

        .login-third-party-btn:active {
            transform: scale(0.95);
        }

        .login-footer {
            text-align: center;
            padding: 24px;
            font-size: 12px;
            color: var(--text-disabled);
        }

        .login-footer a {
            color: var(--primary-color);
        }

        .login-content {
            display: none;
        }

        .login-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>
                </svg>
            </div>
            <h1 class="login-title">欢迎回来</h1>
            <p class="login-subtitle">登录后享受更多服务</p>
        </div>

        <div class="login-form">
            <div class="login-tabs">
                <div class="login-tab active" data-tab="code">验证码登录</div>
                <div class="login-tab" data-tab="password">密码登录</div>
            </div>

            <!-- 验证码登录 -->
            <div class="login-content active" id="tab-code">
                <div class="input-group">
                    <label class="input-label">手机号</label>
                    <input type="tel" class="input" id="phone-code" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="input-group">
                    <label class="input-label">验证码</label>
                    <div class="input-wrapper">
                        <input type="text" class="input" id="code" placeholder="请输入验证码" maxlength="6">
                        <button class="login-code-btn" id="send-code-btn">获取验证码</button>
                    </div>
                </div>
            </div>

            <!-- 密码登录 -->
            <div class="login-content" id="tab-password">
                <div class="input-group">
                    <label class="input-label">手机号</label>
                    <input type="tel" class="input" id="phone-password" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="input-group">
                    <label class="input-label">密码</label>
                    <input type="password" class="input" id="password" placeholder="请输入密码（至少6位）">
                </div>
                <div class="login-forget">
                    <a href="forget-password.html">忘记密码？</a>
                </div>
            </div>

            <div class="login-agreement">
                <input type="checkbox" id="agreement">
                <label for="agreement">
                    我已阅读并同意<a href="#">《用户服务协议》</a>和<a href="#">《隐私政策》</a>
                </label>
            </div>

            <button class="btn btn-primary btn-lg btn-block" id="login-btn">登录</button>

            <div class="login-third-party">
                <div class="login-third-party-title">其他登录方式</div>
                <div class="login-third-party-btns">
                    <button class="login-third-party-btn" style="color: #07C160;" onclick="showToast('微信登录开发中')">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M8.69 13.3c-.94.37-1.37.87-1.37 1.47 0 .72.73 1.18 1.73 1.18.91 0 1.38-.36 1.67-.64l-1.03-1.76c-.16.11-.44.29-.77.29-.47 0-.77-.28-.77-.68h2.38c0-.89-.08-1.14-.84-1.86zm3.61-1.8c0 .6-.55.97-1.22.97-.6 0-1.05-.27-1.05-.8 0-.59.48-.88 1.11-.88.62 0 1.16.27 1.16.71zm1.65 5.56c-2.42 0-4.33-.87-5.88-2.23-.24-.22-.06-.44.21-.33 1.01.38 2.46.58 3.69.58.85 0 1.58-.11 2.12-.27.29-.08.41.1.32.35-.29.78-1.26 1.9-3.18 1.9h-2.34c-1.71 0-3.31-.44-3.31-2.22 0-1.73 2.42-2.48 5.17-2.48.79 0 1.67.05 2.46.16.28.04.44-.16.33-.4-.29-.64-1.87-1.46-2.98-1.46h-1.93c-2.07.04-4.02.88-4.02 2.86 0 1.95 2.16 3.01 3.88 3.01 1.26 0 2.05-.38 2.05-.38.24-.14.4.1.4.33v1.73c0 .24-.16.4-.4.4-.24 0-1.32-.2-1.87-.2-.93 0-1.67.26-1.67.26-.24.13-.48-.03-.48-.33v-1.6h-1.71c-.24 0-.4-.16-.4-.4v-1.22c0-.24.16-.4.4-.4h4.38c1.79 0 3.1.69 3.1 2.3 0 1.1-.71 1.87-1.82 2.24v.04z"/>
                        </svg>
                    </button>
                    <button class="login-third-party-btn" style="color: #1677FF;" onclick="showToast('支付宝登录开发中')">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="login-footer">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script>
        // Tab切换
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.login-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // 发送验证码
        let countdown = 0;
        const sendCodeBtn = document.getElementById('send-code-btn');
        
        sendCodeBtn.addEventListener('click', function() {
            const phone = document.getElementById('phone-code').value;
            if (!phone || phone.length !== 11) {
                showToast('请输入正确的手机号');
                return;
            }
            
            countdown = 60;
            this.disabled = true;
            this.textContent = countdown + '秒后重试';
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    this.disabled = false;
                    this.textContent = '获取验证码';
                } else {
                    this.textContent = countdown + '秒后重试';
                }
            }, 1000);
            
            showToast('验证码已发送');
        });

        // 登录
        document.getElementById('login-btn').addEventListener('click', function() {
            const agreement = document.getElementById('agreement').checked;
            if (!agreement) {
                showToast('请先阅读并同意用户协议');
                return;
            }

            const activeTab = document.querySelector('.login-tab.active').dataset.tab;
            
            if (activeTab === 'code') {
                const phone = document.getElementById('phone-code').value;
                const code = document.getElementById('code').value;
                
                if (!phone || phone.length !== 11) {
                    showToast('请输入正确的手机号');
                    return;
                }
                if (!code || code.length !== 6) {
                    showToast('请输入6位验证码');
                    return;
                }
            } else {
                const phone = document.getElementById('phone-password').value;
                const password = document.getElementById('password').value;
                
                if (!phone || phone.length !== 11) {
                    showToast('请输入正确的手机号');
                    return;
                }
                if (!password || password.length < 6) {
                    showToast('密码至少6位');
                    return;
                }
            }

            // 模拟登录
            const phone = activeTab === 'code' ? 
                document.getElementById('phone-code').value : 
                document.getElementById('phone-password').value;
            
            const result = mockLogin(phone, '123456');
            
            if (result.success) {
                showToast('登录成功');
                setTimeout(() => {
                    goTo('home.html');
                }, 1000);
            } else {
                showToast(result.message);
            }
        });

        // 第三方登录提示
        document.querySelectorAll('.login-third-party-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                showToast('第三方登录开发中');
            });
        });
    </script>
</body>
</html>
