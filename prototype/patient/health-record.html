<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康档案 - 在线问诊平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/patient.css">
    <style>
        .health-record-section {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .health-record-section-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .health-record-section-title {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .health-record-section-title svg {
            color: var(--primary-color);
        }

        .health-record-section-content {
            padding: 16px;
        }

        .health-record-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .health-record-row:last-child {
            border-bottom: none;
        }

        .health-record-label {
            width: 100px;
            color: var(--text-secondary);
            font-size: 14px;
            flex-shrink: 0;
        }

        .health-record-value {
            flex: 1;
            font-size: 14px;
        }

        .health-record-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
        }

        .health-record-empty svg {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
            color: var(--text-disabled);
        }

        .vital-signs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .vital-sign-item {
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
        }

        .vital-sign-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .vital-sign-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .vital-sign-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .vital-sign-status.normal {
            background: var(--success-bg);
            color: var(--success-color);
        }

        .vital-sign-status.warning {
            background: var(--warning-bg);
            color: var(--warning-color);
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 导航栏 -->
        <div class="navbar">
            <div class="navbar-left">
                <a href="home.html" class="navbar-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </a>
            </div>
            <div class="navbar-title">健康档案</div>
            <div class="navbar-right">
                <a href="#" class="navbar-icon" onclick="showToast('编辑档案'); return false;">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                </a>
            </div>
        </div>

        <div class="content">
            <!-- 基础信息 -->
            <div class="health-record-section">
                <div class="health-record-section-header">
                    <div class="health-record-section-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        基础信息
                    </div>
                </div>
                <div class="health-record-section-content">
                    <div class="health-record-row">
                        <div class="health-record-label">姓名</div>
                        <div class="health-record-value">张三</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">性别</div>
                        <div class="health-record-value">男</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">年龄</div>
                        <div class="health-record-value">45岁</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">血型</div>
                        <div class="health-record-value">O型</div>
                    </div>
                </div>
            </div>

            <!-- 体征数据 -->
            <div class="health-record-section">
                <div class="health-record-section-header">
                    <div class="health-record-section-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z"/>
                        </svg>
                        体征数据
                    </div>
                    <a href="#" style="color: var(--primary-color); font-size: 13px;" onclick="showToast('添加数据'); return false;">添加</a>
                </div>
                <div class="health-record-section-content">
                    <div class="vital-signs">
                        <div class="vital-sign-item">
                            <div class="vital-sign-value" style="color: var(--success-color);">120</div>
                            <div class="vital-sign-label">血压(mmHg)</div>
                            <div class="vital-sign-status normal">正常</div>
                        </div>
                        <div class="vital-sign-item">
                            <div class="vital-sign-value" style="color: var(--success-color);">78</div>
                            <div class="vital-sign-label">心率(次/分)</div>
                            <div class="vital-sign-status normal">正常</div>
                        </div>
                        <div class="vital-sign-item">
                            <div class="vital-sign-value" style="color: var(--warning-color);">6.5</div>
                            <div class="vital-sign-label">血糖(mmol/L)</div>
                            <div class="vital-sign-status warning">偏高</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 健康信息 -->
            <div class="health-record-section">
                <div class="health-record-section-header">
                    <div class="health-record-section-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                        </svg>
                        健康信息
                    </div>
                </div>
                <div class="health-record-section-content">
                    <div class="health-record-row">
                        <div class="health-record-label">过敏史</div>
                        <div class="health-record-value">青霉素</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">既往病史</div>
                        <div class="health-record-value">高血压病史5年</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">家族病史</div>
                        <div class="health-record-value">父亲有高血压病史</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">手术史</div>
                        <div class="health-record-value">无</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">用药史</div>
                        <div class="health-record-value">硝苯地平缓释片</div>
                    </div>
                </div>
            </div>

            <!-- 生活方式 -->
            <div class="health-record-section">
                <div class="health-record-section-header">
                    <div class="health-record-section-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05l-5 2.02v6.12c0 .64-.37 1.22-.97 1.48l-4.77 2.03 1.26 2.36 5.54-2.04zM1 21.99h15.03c.55 0 1-.45 1-1 0-.55-.45-1-1-1H1v-3.99c0-.55-.45-1-1-1s-1 .45-1 1v4c0 .55.45 1 1 1zm6-12.99l-6 2.26v5.73c0 .56.45 1.01 1.01 1.01H8.5l1.73 3.25c.16.31.48.51.82.51h.9l-.4-1.49L12 8.5l1.45.5L15 6l-8-.5zm3.5 3.51c.61 0 1.1.49 1.1 1.1 0 .61-.49 1.1-1.1 1.1s-1.1-.49-1.1-1.1c0-.61.49-1.1 1.1-1.1z"/>
                        </svg>
                        生活方式
                    </div>
                </div>
                <div class="health-record-section-content">
                    <div class="health-record-row">
                        <div class="health-record-label">吸烟状况</div>
                        <div class="health-record-value">偶尔</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">饮酒状况</div>
                        <div class="health-record-value">偶尔</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">锻炼频率</div>
                        <div class="health-record-value">每周2-3次</div>
                    </div>
                </div>
            </div>

            <!-- 紧急联系人 -->
            <div class="health-record-section">
                <div class="health-record-section-header">
                    <div class="health-record-section-title">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                        紧急联系人
                    </div>
                </div>
                <div class="health-record-section-content">
                    <div class="health-record-row">
                        <div class="health-record-label">联系人</div>
                        <div class="health-record-value">李四</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">关系</div>
                        <div class="health-record-value">配偶</div>
                    </div>
                    <div class="health-record-row">
                        <div class="health-record-label">联系电话</div>
                        <div class="health-record-value" style="color: var(--primary-color);">13900139000</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
</body>
</html>
