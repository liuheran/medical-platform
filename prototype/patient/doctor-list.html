<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择医生 - 在线问诊平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/patient.css">
    <style>
        .filter-section {
            background: var(--bg-color);
            padding: 12px 16px;
            position: sticky;
            top: var(--nav-height);
            z-index: 10;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-tag {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            border: none;
        }

        .filter-tag.active {
            background: var(--primary-bg);
            color: var(--primary-color);
        }

        .filter-tag:active {
            transform: scale(0.95);
        }

        .doctor-list-container {
            padding: 16px;
        }

        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sort-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .sort-item.active {
            color: var(--primary-color);
        }

        .online-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
        }

        .online-filter input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 导航栏 -->
        <div class="navbar">
            <div class="navbar-left">
                <a href="home.html" class="navbar-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </a>
            </div>
            <div class="navbar-title">选择医生</div>
            <div class="navbar-right"></div>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-section">
            <div class="filter-row" id="department-filter">
                <button class="filter-tag active" data-id="">全部科室</button>
            </div>
            <div class="filter-row mt-sm" style="margin-top: 8px;">
                <button class="filter-tag active" data-title="">全部职称</button>
                <button class="filter-tag" data-title="主任医师">主任医师</button>
                <button class="filter-tag" data-title="副主任医师">副主任医师</button>
                <button class="filter-tag" data-title="主治医师">主治医师</button>
            </div>
            <div class="sort-bar">
                <div class="online-filter">
                    <input type="checkbox" id="online-only">
                    <label for="online-only">仅看在线</label>
                </div>
                <div class="sort-item active" data-sort="rating">
                    综合推荐
                </div>
            </div>
        </div>

        <!-- 医生列表 -->
        <div class="doctor-list-container" id="doctor-list">
            <!-- 动态渲染 -->
        </div>

        <!-- 底部导航 -->
        <div class="tab-bar">
            <div class="tab-item" onclick="goTo('home.html')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>首页</span>
            </div>
            <div class="tab-item active">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span>问诊</span>
            </div>
            <div class="tab-item" onclick="goTo('order-list.html')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <span>订单</span>
            </div>
            <div class="tab-item" onclick="goTo('profile.html')">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script>
        // 当前筛选条件
        let filters = {
            departmentId: '',
            title: '',
            onlineOnly: false,
            sort: 'rating'
        };

        // 初始化科室筛选
        function initDepartmentFilter() {
            const container = document.getElementById('department-filter');
            const params = getUrlParams();
            
            if (params.departmentId) {
                filters.departmentId = params.departmentId;
            }

            let html = `<button class="filter-tag ${!filters.departmentId ? 'active' : ''}" data-id="">全部科室</button>`;
            
            DEPARTMENTS.forEach(dept => {
                const isActive = filters.departmentId == dept.id ? 'active' : '';
                const deptName = dept.children && dept.children.length > 0 ? 
                    dept.name : dept.name;
                html += `<button class="filter-tag ${isActive}" data-id="${dept.id}">${deptName}</button>`;
            });

            container.innerHTML = html;

            // 绑定点击事件
            container.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    filters.departmentId = this.dataset.id;
                    renderDoctorList();
                });
            });
        }

        // 渲染医生列表
        function renderDoctorList() {
            const container = document.getElementById('doctor-list');
            let doctors = [...DOCTORS];

            // 筛选
            if (filters.departmentId) {
                doctors = doctors.filter(d => d.departmentId == filters.departmentId || 
                    DEPARTMENTS.some(dept => 
                        dept.id == filters.departmentId && 
                        dept.children && dept.children.some(child => child.id == d.departmentId)
                    ));
            }
            if (filters.title) {
                doctors = doctors.filter(d => d.title === filters.title);
            }
            if (filters.onlineOnly) {
                doctors = doctors.filter(d => d.isOnline);
            }

            // 排序
            if (filters.sort === 'rating') {
                doctors.sort((a, b) => b.rating - a.rating);
            } else if (filters.sort === 'price') {
                doctors.sort((a, b) => a.price - b.price);
            } else if (filters.sort === 'consultationCount') {
                doctors.sort((a, b) => b.consultationCount - a.consultationCount);
            }

            if (doctors.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" width="120" height="120" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <div class="empty-title">暂无符合条件的医生</div>
                        <div class="empty-desc">试试调整筛选条件</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = doctors.map(doctor => {
                const titleClass = doctor.titleLevel === 1 ? 'gold' : 
                                   doctor.titleLevel === 2 ? 'silver' : '';
                const statusClass = !doctor.isOnline ? 'offline' : 
                                   !doctor.isAccepting ? 'busy' : '';
                const statusText = !doctor.isOnline ? '离线' : 
                                  !doctor.isAccepting ? '已约满' : '可问诊';
                const btnDisabled = !doctor.isOnline || !doctor.isAccepting;

                return `
                    <div class="doctor-card" style="margin-bottom: 12px;">
                        <div class="doctor-card-avatar">
                            <img src="${doctor.avatar}" alt="${doctor.name}">
                        </div>
                        <div class="doctor-card-info">
                            <div class="doctor-card-header">
                                <span class="doctor-card-name">${doctor.name}</span>
                                <span class="doctor-card-title ${titleClass}">${doctor.title}</span>
                            </div>
                            <div class="doctor-card-dept">${doctor.departmentName} · ${doctor.hospitalName}</div>
                            <div class="doctor-card-specialty">擅长：${doctor.specialty}</div>
                            <div class="doctor-card-footer">
                                <div>
                                    <div class="doctor-card-rating" style="margin-bottom: 4px;">
                                        ★ ${doctor.rating}
                                        <span>(${doctor.reviewCount}条)</span>
                                    </div>
                                    <div class="doctor-card-status ${statusClass}">
                                        <span class="status-dot" style="${!doctor.isOnline || doctor.isAccepting ? 'background: var(--success-color)' : ''}"></span>
                                        ${statusText}
                                    </div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="doctor-card-price">¥${doctor.price}<small>/次</small></div>
                                    <button class="btn btn-primary btn-sm mt-sm" 
                                            style="margin-top: 4px;"
                                            ${btnDisabled ? 'disabled' : ''}
                                            onclick="${btnDisabled ? '' : `goTo('doctor-detail.html?id=${doctor.id}')`}">
                                        ${btnDisabled ? statusText : '立即问诊'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 绑定事件
        document.querySelectorAll('.filter-row .filter-tag[data-title]').forEach(tag => {
            tag.addEventListener('click', function() {
                const container = this.parentElement;
                container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                filters.title = this.dataset.title;
                renderDoctorList();
            });
        });

        document.getElementById('online-only').addEventListener('change', function() {
            filters.onlineOnly = this.checked;
            renderDoctorList();
        });

        document.querySelectorAll('.sort-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sort-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                filters.sort = this.dataset.sort;
                renderDoctorList();
            });
        });

        // 初始化
        initDepartmentFilter();
        renderDoctorList();
    </script>
</body>
</html>
