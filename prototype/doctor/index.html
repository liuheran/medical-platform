<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>医生端 - 在线问诊平台</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/doctor.css">
    <script src="../js/avatar.js"></script>
    <style>
        body {
            background: var(--bg-secondary);
        }

        .doctor-login-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .doctor-login-header {
            padding: 60px 24px 40px;
            background: linear-gradient(135deg, #52C41A, #73D13D);
            color: #fff;
            text-align: center;
        }

        .doctor-login-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .doctor-login-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .doctor-login-subtitle {
            opacity: 0.9;
            font-size: 14px;
        }

        .doctor-login-form {
            flex: 1;
            padding: 24px;
            background: var(--bg-color);
        }

        .doctor-entry-card {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .doctor-entry-card:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }

        .doctor-entry-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--primary-bg);
            color: var(--primary-color);
        }

        .doctor-entry-icon.green {
            background: var(--success-bg);
            color: var(--success-color);
        }

        .doctor-entry-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .doctor-entry-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 医生端样式 */
        .doctor-dashboard {
            padding: 16px;
        }

        .doctor-header {
            background: linear-gradient(135deg, #52C41A, #73D13D);
            color: #fff;
            padding: 24px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
        }

        .doctor-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .doctor-header-avatar {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-full);
            border: 3px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .doctor-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .doctor-header-name {
            font-size: 18px;
            font-weight: 600;
        }

        .doctor-header-title {
            font-size: 13px;
            opacity: 0.9;
        }

        .doctor-header-stats {
            display: flex;
            justify-content: space-around;
        }

        .doctor-header-stat {
            text-align: center;
        }

        .doctor-header-stat-value {
            font-size: 24px;
            font-weight: 600;
        }

        .doctor-header-stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .stat-card {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-card-info {
            flex: 1;
        }

        .stat-card-value {
            font-size: 24px;
            font-weight: 600;
        }

        .stat-card-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .inquiry-card {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .inquiry-card-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .inquiry-card-patient {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .inquiry-card-avatar {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        .inquiry-card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .inquiry-card-name {
            font-weight: 500;
        }

        .inquiry-card-type {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .inquiry-card-status {
            padding: 4px 8px;
            border-radius: var(--radius-full);
            font-size: 12px;
        }

        .inquiry-card-status.pending {
            background: var(--warning-bg);
            color: var(--warning-color);
        }

        .inquiry-card-status.active {
            background: var(--primary-bg);
            color: var(--primary-color);
        }

        .inquiry-card-body {
            padding: 12px 16px;
        }

        .inquiry-card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .inquiry-card-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inquiry-card-time {
            font-size: 12px;
            color: var(--text-disabled);
        }

        .doctor-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-color);
            display: flex;
            padding-bottom: 34px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
        }

        .doctor-nav-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .doctor-nav-item.active {
            color: var(--success-color);
        }

        /* 待处理问诊区块 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 16px 12px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .section-more {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 14px;
            color: #999;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="login-page" class="doctor-login-page">
        <div class="doctor-login-header">
            <div class="doctor-login-logo">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="currentColor">
                    <path d="M19 8h-1V3H6v5H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zM8 5h8v3H8V5zm8 14H8v-4h8v4zm2-4v-2H6v2H4v-4c0-.55.45-1 1-1h14c.55 0 1 .45 1 1v4h-2z"/>
                </svg>
            </div>
            <h1 class="doctor-login-title">医生端</h1>
            <p class="doctor-login-subtitle">在线接诊，开具处方</p>
        </div>
        <div class="doctor-login-form">
            <div class="input-group" style="margin-bottom: 16px;">
                <label class="input-label">手机号</label>
                <input type="tel" class="input" id="doctor-phone" placeholder="请输入手机号" value="13900139000">
            </div>
            <div class="input-group" style="margin-bottom: 24px;">
                <label class="input-label">密码</label>
                <input type="password" class="input" id="doctor-password" placeholder="请输入密码" value="123456">
            </div>
            <button class="btn btn-primary btn-lg btn-block" onclick="doctorLogin()">登录</button>
            <div style="text-align: center; margin-top: 24px;">
                <a href="dashboard.html" style="color: var(--success-color); font-size: 14px;">跳过登录，直接体验</a>
            </div>
        </div>
    </div>

    <!-- 工作台页面 -->
    <div id="dashboard-page" class="page" style="display: none; padding-bottom: 80px;">
        <div class="doctor-header">
            <div class="doctor-header-info">
                <div class="doctor-header-avatar">
                    <img src="https://i.pravatar.cc/150?img=68" alt="王建国" onerror="this.src=generateAvatar(this.alt)">
                </div>
                <div>
                    <div class="doctor-header-name">王建国</div>
                    <div class="doctor-header-title">主任医师 · 心内科</div>
                </div>
                <div style="flex: 1;"></div>
                <div style="text-align: right;">
                    <div style="font-size: 20px; font-weight: 600;">¥2,560</div>
                    <div style="font-size: 12px; opacity: 0.8;">今日收入</div>
                </div>
            </div>
            <div class="doctor-header-stats">
                <div class="doctor-header-stat">
                    <div class="doctor-header-stat-value">12</div>
                    <div class="doctor-header-stat-label">今日问诊</div>
                </div>
                <div class="doctor-header-stat">
                    <div class="doctor-header-stat-value">3</div>
                    <div class="doctor-header-stat-label">待接诊</div>
                </div>
                <div class="doctor-header-stat">
                    <div class="doctor-header-stat-value">5</div>
                    <div class="doctor-header-stat-label">待开处方</div>
                </div>
            </div>
        </div>

        <div class="content" style="padding-top: 0;">
            <!-- 快捷操作 -->
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <div class="doctor-entry-card" style="flex: 1; margin-bottom: 0;" onclick="location.href='schedule.html'">
                    <div class="doctor-entry-icon green">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/>
                        </svg>
                    </div>
                    <div class="doctor-entry-info">
                        <h3>排班管理</h3>
                        <p>设置出诊时间</p>
                    </div>
                </div>
                <div class="doctor-entry-card" style="flex: 1; margin-bottom: 0;" onclick="location.href='statistics.html'">
                    <div class="doctor-entry-icon" style="background: var(--warning-bg); color: var(--warning-color);">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                        </svg>
                    </div>
                    <div class="doctor-entry-info">
                        <h3>统计报表</h3>
                        <p>查看问诊数据</p>
                    </div>
                </div>
            </div>

            <!-- 待处理问诊 -->
            <div class="section-header">
                <h2 class="section-title">待处理问诊</h2>
                <a href="#" class="section-more" onclick="location.href='inquiry-list.html'; return false;">
                    查看全部
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </a>
            </div>

            <div id="inquiry-list">
                <!-- 动态渲染 -->
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="doctor-nav">
            <div class="doctor-nav-item active">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>工作台</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='patients.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span>患者</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='prescription-history.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <span>处方</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='statistics.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <span>统计</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='settings.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script>
        // 医生登录
        function doctorLogin() {
            const phone = document.getElementById('doctor-phone').value;
            const password = document.getElementById('doctor-password').value;
            
            if (!phone || !password) {
                showToast('请输入手机号和密码');
                return;
            }

            const result = mockDoctorLogin(phone, password);
            if (result.success) {
                showToast('登录成功');
                setTimeout(() => {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('dashboard-page').style.display = 'block';
                    renderInquiryList();
                }, 1000);
            }
        }

        // 模拟待处理问诊
        const pendingInquiries = [
            {
                id: 50001,
                patient: { id: 20001, name: '张三', avatar: 'https://i.pravatar.cc/150?img=1' },
                type: 1,
                typeName: '图文问诊',
                description: '最近经常头疼，已经持续一周，伴有失眠症状。',
                time: '10:00',
                status: 'pending'
            },
            {
                id: 50002,
                patient: { id: 20002, name: '李四', avatar: 'https://i.pravatar.cc/150?img=5' },
                type: 2,
                typeName: '语音问诊',
                description: '高血压病史，想咨询用药调整',
                time: '09:30',
                status: 'pending'
            },
            {
                id: 50003,
                patient: { id: 20003, name: '王五', avatar: 'https://i.pravatar.cc/150?img=8' },
                type: 3,
                typeName: '视频问诊',
                description: '皮肤红疹，想让医生看看具体情况',
                time: '09:15',
                status: 'pending'
            },
            {
                id: 50004,
                patient: { id: 20004, name: '赵六', avatar: 'https://i.pravatar.cc/150?img=12' },
                type: 1,
                typeName: '图文问诊',
                description: '心悸、胸闷，体检心电图异常',
                time: '09:00',
                status: 'active'
            }
        ];

        // 渲染问诊列表
        function renderInquiryList() {
            const container = document.getElementById('inquiry-list');
            container.innerHTML = pendingInquiries.map(inquiry => `
                <div class="inquiry-card" onclick="goToPatientDetail(${inquiry.patient.id})">
                    <div class="inquiry-card-header">
                        <div class="inquiry-card-patient">
                            <div class="inquiry-card-avatar">
                                <img src="${inquiry.patient.avatar}" alt="${inquiry.patient.name}" onerror="this.src=generateAvatar('${inquiry.patient.name}')">
                            </div>
                            <div>
                                <div class="inquiry-card-name">${inquiry.patient.name}</div>
                                <div class="inquiry-card-type">${inquiry.typeName}</div>
                            </div>
                        </div>
                        <span class="inquiry-card-status ${inquiry.status}">
                            ${inquiry.status === 'pending' ? '待接诊' : '问诊中'}
                        </span>
                    </div>
                    <div class="inquiry-card-body">
                        <div class="inquiry-card-desc">${inquiry.description}</div>
                    </div>
                    <div class="inquiry-card-footer">
                        <span class="inquiry-card-time">${inquiry.time}</span>
                        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); ${inquiry.status === 'pending' ? 'acceptInquiry(' + inquiry.id + ')' : 'continueInquiry(' + inquiry.id + ')'}">
                            ${inquiry.status === 'pending' ? '立即接诊' : '继续问诊'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 接诊
        function acceptInquiry(id) {
            // 查找对应的患者信息
            const inquiry = pendingInquiries.find(i => i.id === id);
            if (inquiry) {
                showToast('已接诊');
                setTimeout(() => {
                    // 所有问诊类型都跳转到 chat.html，根据 type 参数显示不同功能
                    const typeMap = { 1: 'text', 2: 'voice', 3: 'video' };
                    const type = typeMap[inquiry.type] || 'text';
                    window.location.href = `chat.html?patientId=${inquiry.patient.id}&inquiryId=${id}&type=${type}`;
                }, 500);
            }
        }

        // 继续问诊
        function continueInquiry(id) {
            // 查找对应的患者信息
            const inquiry = pendingInquiries.find(i => i.id === id);
            if (inquiry) {
                showToast('进入问诊界面...');
                setTimeout(() => {
                    // 跳转到聊天页面，传递患者ID和问诊类型
                    const typeMap = { 1: 'text', 2: 'voice', 3: 'video' };
                    const type = typeMap[inquiry.type] || 'text';
                    window.location.href = `chat.html?patientId=${inquiry.patient.id}&inquiryId=${id}&type=${type}`;
                }, 500);
            }
        }

        // 跳转到患者详情
        function goToPatientDetail(patientId) {
            window.location.href = `patient-detail.html?id=${patientId}`;
        }

        // 检查是否已登录
        if (isLoggedIn() && getCurrentUser().userType === 2) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'block';
            renderInquiryList();
        }
    </script>
</body>
</html>
