<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人设置 - 医生端</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/doctor.css">
    <script src="../js/avatar.js"></script>
    <style>
        body {
            background: var(--bg-secondary);
        }
        .page-header {
            background: linear-gradient(135deg, #52C41A, #73D13D);
            color: #fff;
            padding: 20px 16px;
        }
        .back-btn-white {
            color: #fff;
        }
        .page-header h1 {
            flex: 1;
            font-size: 18px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
        }
        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-full);
            border: 3px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-info {
            flex: 1;
        }
        .profile-name {
            font-size: 20px;
            font-weight: 600;
        }
        .profile-title {
            font-size: 14px;
            opacity: 0.9;
        }
        .profile-dept {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .settings-content {
            padding: 16px;
        }
        .settings-section {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .settings-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--bg-secondary);
            cursor: pointer;
        }
        .settings-item:last-child {
            border-bottom: none;
        }
        .settings-item:active {
            background: var(--bg-secondary);
        }
        .settings-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        .settings-icon.primary {
            background: var(--primary-bg);
            color: var(--primary-color);
        }
        .settings-icon.success {
            background: var(--success-bg);
            color: var(--success-color);
        }
        .settings-icon.warning {
            background: var(--warning-bg);
            color: var(--warning-color);
        }
        .settings-icon.danger {
            background: var(--danger-bg);
            color: var(--danger-color);
        }
        .settings-info {
            flex: 1;
        }
        .settings-title {
            font-size: 15px;
            font-weight: 500;
        }
        .settings-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .settings-arrow {
            color: var(--text-disabled);
        }
        .switch-toggle {
            position: relative;
            width: 48px;
            height: 28px;
            background: var(--text-disabled);
            border-radius: 14px;
            transition: background 0.2s;
        }
        .switch-toggle.active {
            background: var(--success-color);
        }
        .switch-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .switch-toggle.active::after {
            transform: translateX(20px);
        }
        .logout-section {
            padding: 16px;
        }
        .logout-btn {
            width: 100%;
            height: 48px;
            background: var(--danger-color);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .doctor-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-color);
            display: flex;
            padding-bottom: 34px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
        }
        .doctor-nav-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .doctor-nav-item.active {
            color: var(--success-color);
        }
        .version-info {
            text-align: center;
            padding: 20px;
            color: var(--text-disabled);
            font-size: 12px;
        }
        .page-content {
            padding-bottom: 80px;
        }
        .stat-row {
            display: flex;
            justify-content: space-around;
            padding: 16px 0;
            margin-top: 16px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="page-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <a href="index.html" class="back-btn back-btn-white">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </a>
                <h1>个人设置</h1>
            </div>
            <div class="profile-header">
                <div class="profile-avatar">
                    <img src="https://i.pravatar.cc/150?img=1" alt="王建国" onerror="this.src=generateAvatar('王建国')">
                </div>
                <div class="profile-info">
                    <div class="profile-name">王建国</div>
                    <div class="profile-title">主任医师</div>
                    <div class="profile-dept">心内科 · 北京协和医院</div>
                </div>
            </div>
            <div class="stat-row">
                <div class="stat-item">
                    <div class="stat-value">1,256</div>
                    <div class="stat-label">问诊量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">4.9</div>
                    <div class="stat-label">评分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">8年</div>
                    <div class="stat-label">从业</div>
                </div>
            </div>
        </div>
        
        <div class="page-content">
            <div class="settings-content">
                <!-- 账号设置 -->
                <div class="settings-section">
                    <div class="settings-item" onclick="showToast('修改个人信息')">
                        <div class="settings-icon primary">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">个人信息</div>
                            <div class="settings-desc">修改头像、姓名、职称等</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                    <div class="settings-item" onclick="showToast('修改密码')">
                        <div class="settings-icon success">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">登录密码</div>
                            <div class="settings-desc">定期修改，保证账号安全</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                    <div class="settings-item" onclick="showToast('绑定手机')">
                        <div class="settings-icon primary">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">手机绑定</div>
                            <div class="settings-desc">138****1234</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- 业务设置 -->
                <div class="settings-section">
                    <div class="settings-item" onclick="location.href='schedule.html'">
                        <div class="settings-icon success">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">排班管理</div>
                            <div class="settings-desc">设置出诊时间和价格</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                    <div class="settings-item" onclick="showToast('接诊设置')">
                        <div class="settings-icon warning">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">接诊设置</div>
                            <div class="settings-desc">设置自动回复和接诊规则</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                    <div class="settings-item" onclick="showToast('处方模板')">
                        <div class="settings-icon primary">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">处方模板</div>
                            <div class="settings-desc">管理常用处方模板</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- 通知设置 -->
                <div class="settings-section">
                    <div class="settings-item">
                        <div class="settings-icon warning">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">消息通知</div>
                            <div class="settings-desc">接收患者问诊消息提醒</div>
                        </div>
                        <div class="switch-toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-icon warning">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">声音提醒</div>
                            <div class="settings-desc">新消息提示音</div>
                        </div>
                        <div class="switch-toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                </div>
                
                <!-- 其他 -->
                <div class="settings-section">
                    <div class="settings-item" onclick="showToast('意见反馈')">
                        <div class="settings-icon primary">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">意见反馈</div>
                            <div class="settings-desc">帮助我们改进产品</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                    <div class="settings-item" onclick="showToast('关于我们')">
                        <div class="settings-icon primary">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                            </svg>
                        </div>
                        <div class="settings-info">
                            <div class="settings-title">关于我们</div>
                            <div class="settings-desc">版本 1.0.0</div>
                        </div>
                        <svg class="settings-arrow" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- 退出登录 -->
            <div class="logout-section">
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
            
            <div class="version-info">
                在线问诊平台 v1.0.0<br>
                © 2026 振涛弘业 All Rights Reserved
            </div>
        </div>
        
        <!-- 底部导航 -->
        <div class="doctor-nav">
            <div class="doctor-nav-item" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>工作台</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='patients.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span>患者</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='prescription.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <span>处方</span>
            </div>
            <div class="doctor-nav-item" onclick="location.href='statistics.html'">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <span>统计</span>
            </div>
            <div class="doctor-nav-item active">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>我的</span>
            </div>
        </div>
    </div>

    <script src="../js/mock-data.js"></script>
    <script>
        // 退出登录
        function logout() {
            if (confirm('确认退出登录？')) {
                localStorage.removeItem('currentUser');
                showToast('已退出登录');
                setTimeout(() => {
                    location.href = 'index.html';
                }, 1000);
            }
        }
    </script>
</body>
</html>
